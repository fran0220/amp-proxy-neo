# LM Studio local server. Enable the OpenAI-compatible server in LM Studio.
custom:
  - id: lmstudio
    name: LM Studio
    base-url: http://localhost:1234/v1
    models:
      - name: local-model
        route: apikey
neo:
  modes:
    rush:
      provider: custom:lmstudio
      model: local-model
      auth: custom:lmstudio
